# Render Blueprint for Mellophi Fashion
# Place this file at repository root for one-click deploy from GitHub.

services:
  - type: web
    name: mellophi-fashion-api
    env: node
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5000

      - key: DATABASE_URL
        fromDatabase:
          name: mellophi-database
          property: connectionString

      - key: FRONTEND_URL
        value: https://mabenaqamangi-hub.github.io/mellophi-fashion

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRE
        value: 7d

      - key: PAYGATE_ID
        value: 12975260

      - key: PAYGATE_SECRET
        sync: false

      - key: PAYGATE_INITIATE_URL
        value: https://secure.paygate.co.za/payweb3/initiate.trans

      - key: PAYGATE_PROCESS_URL
        value: https://secure.paygate.co.za/payweb3/process.trans

      - key: PAYGATE_RETURN_URL
        value: https://mabenaqamangi-hub.github.io/mellophi-fashion/payment-return.html

      - key: PAYGATE_NOTIFY_URL
        value: https://mellophi-fashion.onrender.com/api/paygate/notify

      - key: MAX_FILE_SIZE
        value: 5242880

      - key: ALLOWED_IMAGE_TYPES
        value: image/jpeg,image/jpg,image/png,image/gif,image/webp

databases:
  - name: mellophi-database
    databaseName: mellophi_fashion
    user: mellophi_user
    plan: free
    region: oregon
    ipAllowList: []
